limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_status 429;

server_tokens off;

# Access logs are an allowlist of observability fields. In particular, do not
# add $request, $request_body, $http_cookie or $http_authorization here: they
# can contain passwords, JWTs, CSRF tokens and other credentials.
log_format flare_json escape=json '{'
    '"@timestamp":"$time_iso8601",'
    '"trace.id":"$request_id",'
    '"source.ip":"$remote_addr",'
    '"http.request.method":"$request_method",'
    '"http.request.bytes":$request_length,'
    '"http.response.status_code":$status,'
    '"http.response.body.bytes":$body_bytes_sent,'
    '"url.path":"$log_url_path",'
    '"url.query":"$log_safe_query",'
    '"url.original":"$log_url_path$is_args$log_safe_query",'
    '"user_agent.original":"$http_user_agent",'
    '"event.duration_seconds":$request_time,'
    '"nginx.upstream.status_code":"$upstream_status",'
    '"nginx.upstream.response_time":"$upstream_response_time",'
    '"flare.detection.type":"$nginx_detection_type",'
    '"flare.detection.severity":"$nginx_detection_severity",'
    '"flare.detection.reason":"$nginx_detection_reason"'
'}';

# Query string values can contain PII, credentials or encoded aliases of a
# sensitive key. Keep no query values at all; Nginx emits heuristics below from
# the original URI before redaction, so detection does not need raw data.
map $args $log_safe_query {
    default "[REDACTED]";
    "" "";
}

# `$uri` changes after the SPA fallback internally rewrites a request to
# /index.html. Derive the path from the immutable original request URI so ECS
# url.path continues to describe what the client requested.
map $request_uri $log_url_path {
    "~^(?<flare_original_path>[^?]*)" $flare_original_path;
}

# These matches deliberately classify *signals*, never block a request or claim
# that exploitation occurred. They run against request_uri before query values
# are redacted from the event, allowing encoded lab payloads to be demonstrated
# without retaining the payload itself in Elasticsearch.
map $request_uri $nginx_detection_type {
    default "";
    "~*(union(?:%20|\+|\s)+select|select(?:%20|\+|\s)+.*(?:from|where)|%27|')" "sql_injection_signal";
    "~*(<script|%3cscript|javascript:|onerror(?:=|%3d)|onload(?:=|%3d))" "xss_signal";
    "~*(\.\./|%2e%2e|%252e%252e)" "path_traversal_signal";
}

map $nginx_detection_type $nginx_detection_severity {
    default "";
    "sql_injection_signal" "high";
    "xss_signal" "high";
    "path_traversal_signal" "high";
}

map $nginx_detection_type $nginx_detection_reason {
    default "";
    "sql_injection_signal" "URL matched a SQL injection heuristic";
    "xss_signal" "URL matched an XSS heuristic";
    "path_traversal_signal" "URL matched a path traversal heuristic";
}

# The configuration is rendered by the official nginx Docker entrypoint. The
# default CIDR is TEST-NET-1, so a direct connection never trusts client-supplied
# forwarding headers. Set NGINX_TRUSTED_PROXY_CIDR only to the private CIDR of
# the reverse proxy/load balancer immediately in front of this container.
set_real_ip_from $NGINX_TRUSTED_PROXY_CIDR;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

geo $realip_remote_addr $from_trusted_proxy {
    default 0;
    $NGINX_TRUSTED_PROXY_CIDR 1;
}

map "$from_trusted_proxy:$http_x_forwarded_proto" $forwarded_proto {
    default $scheme;
    "~^1:https$" https;
}

map $forwarded_proto $forwarded_port {
    default 80;
    https 443;
}

map "$host:$forwarded_proto" $redirect_to_https {
    default 0;
    "flarefitness.site:http" 1;
    "www.flarefitness.site:http" 1;
}

# Do not serve the application for arbitrary Host headers. Local development
# still works through localhost/127.0.0.1; production requests use the two
# explicitly configured public names below.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name flarefitness.site www.flarefitness.site localhost 127.0.0.1 ${NGINX_PUBLIC_SERVER_NAME};
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;
    access_log /var/log/nginx/access.json.log flare_json;
    error_log /var/log/nginx/error.log warn;

    # Nginx owns the identifier at the Internet boundary. The same value is
    # forwarded to Spring so its MDC/application logs correlate with this ECS
    # event without accepting a caller-controlled request ID. The response
    # header itself lives in security-headers.conf because Nginx add_header
    # inheritance stops at locations that define their own headers.

    if ($redirect_to_https) {
        return 301 https://$host$request_uri;
    }
    client_max_body_size 1m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    include /etc/nginx/snippets/security-headers.conf;

    location /api/ {
        include /etc/nginx/snippets/security-headers.conf;
        limit_req zone=api_limit burst=60 nodelay;

        set $app_upstream http://app:8080;
        proxy_pass $app_upstream;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Never forward client-controlled forwarding headers. $remote_addr is
        # the direct client, or the real client extracted from a trusted proxy.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-Prefix "";
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Request-ID;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~* \.(?:css|js|png|jpe?g|webp|gif|svg|ico|woff2?)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
