spring.application.name=flare-fitness-backend

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
# Nginx is the only public entry point and derives forwarding information from
# its configured trusted proxy CIDR. The application itself must not let a
# direct/internal caller change its scheme, host, or port with X-Forwarded-*.
# Rate limiting resolves Nginx's sanitized X-Forwarded-For explicitly.
server.forward-headers-strategy=none
server.shutdown=graceful

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flare_fitness?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=FlareFitnessHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-migration-naming=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

management.endpoints.web.exposure.include=health,info

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
app.security.login.max-attempts-per-minute=${APP_SECURITY_LOGIN_MAX_ATTEMPTS_PER_MINUTE:5}
app.security.login.max-account-attempts-per-minute=${APP_SECURITY_LOGIN_MAX_ACCOUNT_ATTEMPTS_PER_MINUTE:5}
app.security.analytics.max-events-per-minute=${APP_ANALYTICS_MAX_EVENTS_PER_MINUTE:120}
app.analytics.retention-days=${APP_ANALYTICS_RETENTION_DAYS:400}
app.analytics.retention-cron=${APP_ANALYTICS_RETENTION_CRON:0 20 3 * * *}
app.security.support.max-messages-per-minute=${APP_SUPPORT_MAX_MESSAGES_PER_MINUTE:20}
app.security.trusted-proxy-cidrs=${APP_TRUSTED_PROXY_CIDRS:}
app.security.token-prefix=${APP_SECURITY_TOKEN_PREFIX:auth:token:}
app.security.user-token-prefix=${APP_SECURITY_USER_TOKEN_PREFIX:auth:user-tokens:}
app.security.auth-cookie-name=${APP_AUTH_COOKIE_NAME:access_token}
app.security.auth-cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.security.login-attempt-prefix=${APP_SECURITY_LOGIN_ATTEMPT_PREFIX:auth:login-attempt:}
app.security.password-reset-token-prefix=${APP_PASSWORD_RESET_TOKEN_PREFIX:auth:password-reset:}
app.security.password-reset-token-ttl-seconds=${APP_PASSWORD_RESET_TOKEN_TTL_SECONDS:300}
app.cache.product-prefix=${APP_CACHE_PRODUCT_PREFIX:cache:product:}
app.cache.product-list-key=${APP_CACHE_PRODUCT_LIST_KEY:cache:products:all}
app.cache.product-ttl-seconds=${APP_CACHE_PRODUCT_TTL_SECONDS:300}
app.cache.recommendation-prefix=${APP_CACHE_RECOMMENDATION_PREFIX:cache:recommendation:}
app.cache.recommendation-popularity-key=${APP_CACHE_RECOMMENDATION_POPULARITY_KEY:cache:recommendation:popularity}
app.cache.recommendation-ttl-seconds=${APP_CACHE_RECOMMENDATION_TTL_SECONDS:900}
app.cache.recommendation-popularity-ttl-seconds=${APP_CACHE_RECOMMENDATION_POPULARITY_TTL_SECONDS:300}
app.otp.redis-prefix=${APP_OTP_REDIS_PREFIX:auth:otp:}
app.otp.ttl-seconds=${APP_OTP_TTL_SECONDS:300}
app.otp.cooldown-seconds=${APP_OTP_COOLDOWN_SECONDS:60}
app.otp.max-verification-attempts=${APP_OTP_MAX_VERIFICATION_ATTEMPTS:5}
app.security.otp.max-requests-per-email-per-hour=${APP_OTP_MAX_REQUESTS_PER_EMAIL_PER_HOUR:5}
app.security.otp.max-requests-per-ip-per-hour=${APP_OTP_MAX_REQUESTS_PER_IP_PER_HOUR:20}
app.security.otp.max-requests-per-email-per-day=${APP_OTP_MAX_REQUESTS_PER_EMAIL_PER_DAY:20}
app.security.otp.max-requests-per-ip-per-day=${APP_OTP_MAX_REQUESTS_PER_IP_PER_DAY:80}
app.mail.from=${APP_MAIL_FROM:${APP_MAIL_USERNAME:}}

logging.level.org.springframework.security=INFO
logging.level.com.flarefitness.backend=INFO
