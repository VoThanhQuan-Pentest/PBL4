services:
  app:
    environment:
      # E2E fixtures are loaded only by application-e2e.properties after the
      # versioned Flyway schema migrations have completed.
      SPRING_PROFILES_ACTIVE: e2e
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      APP_MAIL_USERNAME: e2e@flarefitness.test
      APP_MAIL_FROM: e2e@flarefitness.test
      APP_MAIL_PASSWORD: e2e-mail-password
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "false"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      APP_SECURITY_LOGIN_MAX_ATTEMPTS_PER_MINUTE: "50"
    depends_on:
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:v1.24.1@sha256:4873e5a441ed368f1e98a832f61257a033859f5e829542cd03fb772d2282ea4e
    ports:
      - "127.0.0.1:${MAILPIT_HTTP_PORT:-8025}:8025"
    networks:
      - flare-internal
