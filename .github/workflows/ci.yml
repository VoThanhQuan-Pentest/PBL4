name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Every third-party action below is pinned to a full commit SHA. Renovate keeps
# these pins current; do not replace them with a mutable tag.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Block newly introduced high-severity dependencies
        uses: actions/dependency-review-action@56339e523c0409420f6c2c9a2f4292bbb3c07dd3 # v4.8.0
        with:
          fail-on-severity: high

  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Run unit tests and coverage baseline gate
        run: npm run test:coverage
      - name: Build production bundle
        run: npm run build
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 14

  backend:
    name: Backend tests and migration integration tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        run: mvn -B -ntp verify
      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-jacoco-coverage
          path: backend/target/site/jacoco
          if-no-files-found: ignore
          retention-days: 14

  dependency-audit:
    name: Maven dependency audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Scan Maven dependencies for CVEs
        run: >-
          mvn -B -ntp org.owasp:dependency-check-maven:12.2.2:check
          -DfailBuildOnCVSS=7
          -Dformat=HTML,JSON
      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.*
          if-no-files-found: ignore
          retention-days: 14

  edge-security:
    name: Nginx configuration and header hardening
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate Compose interpolation
        run: sh scripts/verify-compose-hardening.sh
      - name: Validate Nginx runtime configuration
        run: |
          docker build --tag flare-nginx-config-test --file nginx/Dockerfile .
          docker run --rm flare-nginx-config-test nginx -t
      - name: Validate rendered Nginx configuration and security headers
        run: sh nginx/test-hardening.sh

  observability-config:
    name: Observability configuration
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Generate ephemeral PKI and product keystores
        run: observability/scripts/bootstrap-secrets.sh
      - name: Validate Compose, Filebeat, Logstash, JSON and saved objects
        run: observability/scripts/validate-config.sh
      - name: Remove ephemeral secrets
        if: always()
        run: rm -rf .secrets/observability

  terraform:
    name: Terraform formatting, validation and IaC scan
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false
      - name: Check formatting
        run: terraform fmt -check
      - name: Initialize the pinned provider without a state backend
        run: terraform init -backend=false -lockfile=readonly
      - name: Validate Terraform configuration
        run: terraform validate
      - name: Scan Terraform misconfigurations
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: '1'

  e2e:
    name: Playwright desktop and mobile E2E
    needs: backend
    runs-on: ubuntu-24.04
    env:
      COMPOSE_PROJECT_NAME: flare-e2e
      E2E_BASE_URL: http://127.0.0.1:8088
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install the version-matched Playwright Chromium runtime
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start isolated E2E stack
        run: >-
          docker compose --env-file .env.e2e.example
          -f docker-compose.yml -f docker-compose.e2e.yml
          up --detach --build --wait --wait-timeout 180
      - name: Run desktop and mobile browser tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Capture E2E service logs
        if: failure()
        run: >-
          docker compose --env-file .env.e2e.example
          -f docker-compose.yml -f docker-compose.e2e.yml
          logs --no-color > e2e-compose.log
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
            e2e-compose.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Tear down E2E stack
        if: always()
        run: >-
          docker compose --env-file .env.e2e.example
          -f docker-compose.yml -f docker-compose.e2e.yml
          down --volumes --remove-orphans

  supply-chain:
    name: Container, filesystem, and SBOM checks
    needs: [frontend, backend]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build backend image
        run: docker build --pull=false --tag flarefitness-backend:ci backend
      - name: Build edge image
        run: docker build --pull=false --tag flarefitness-nginx:ci --file nginx/Dockerfile .
      - name: Scan repository dependencies, secrets, and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Scan backend container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: flarefitness-backend:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Scan edge container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: flarefitness-nginx:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Generate backend SBOM
        uses: anchore/sbom-action@aa0e114b2e19480f157109b9922bda359bd98b90 # v0.20.8
        with:
          image: flarefitness-backend:ci
          format: cyclonedx-json
          artifact-name: backend-sbom.cdx.json
          output-file: backend-sbom.cdx.json
          upload-artifact-retention: 30
      - name: Generate edge SBOM
        uses: anchore/sbom-action@aa0e114b2e19480f157109b9922bda359bd98b90 # v0.20.8
        with:
          image: flarefitness-nginx:ci
          format: cyclonedx-json
          artifact-name: edge-sbom.cdx.json
          output-file: edge-sbom.cdx.json
          upload-artifact-retention: 30
