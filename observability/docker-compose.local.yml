# Local-only composition. Use through observability/scripts/local-lab.sh so the
# base Web stack and Monitor stack are always combined in the same project.
services:
  app:
    environment:
      APP_CORS_ALLOWED_ORIGINS: "http://127.0.0.1:${LOCAL_LAB_WEB_PORT:-8088}"

  db:
    ports: !reset []

  mailpit:
    ports: !reset []

  elasticsearch:
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  logstash:
    ports: !reset []
    networks:
      - observability-internal
      - observability-beats

  kibana:
    ports: !override
      - "127.0.0.1:5601:5601"

  nginx:
    ports: !override
      - "127.0.0.1:${LOCAL_LAB_WEB_PORT:-8088}:80"

  filebeat:
    environment:
      LOGSTASH_HOSTS: logstash:5044
    networks:
      - flare-internal
      - observability-beats

volumes:
  elasticsearch-data:

networks:
  observability-beats:
    driver: bridge
    internal: true
