input {
  beats {
    id => "filebeat-nginx-mtls"
    port => 5044
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca.crt"]
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash.key"
    ssl_client_authentication => "required"
    client_inactivity_timeout => 120
  }
}

filter {
  # One defensive validator owns required fields, timestamp parsing, numeric
  # conversion and CIDR scope classification. No malformed event can raise out
  # of this block or stop the pipeline; every failure gets a stable reason.
  ruby {
    init => '
      require "ipaddr"
      require "time"
      @scopes = [
        ["loopback", [IPAddr.new("127.0.0.0/8"), IPAddr.new("::1/128")]],
        ["private", [IPAddr.new("10.0.0.0/8"), IPAddr.new("172.16.0.0/12"), IPAddr.new("192.168.0.0/16"), IPAddr.new("fc00::/7")]],
        ["link_local", [IPAddr.new("169.254.0.0/16"), IPAddr.new("fe80::/10")]],
        ["test_net", [IPAddr.new("192.0.2.0/24"), IPAddr.new("198.51.100.0/24"), IPAddr.new("203.0.113.0/24"), IPAddr.new("2001:db8::/32")]],
        ["reserved", [IPAddr.new("0.0.0.0/8"), IPAddr.new("100.64.0.0/10"), IPAddr.new("192.0.0.0/24"), IPAddr.new("192.88.99.0/24"), IPAddr.new("198.18.0.0/15"), IPAddr.new("224.0.0.0/4"), IPAddr.new("240.0.0.0/4"), IPAddr.new("::/128"), IPAddr.new("100::/64"), IPAddr.new("ff00::/8")]]
      ]
    '
    code => '
      reasons = []
      if event.get("[error][type]") == "json" || event.get("[error][message]")
        decode_error = (event.get("[error][message]") || "Filebeat could not decode NDJSON").to_s
        reasons << decode_error
        timestamp_match = decode_error.match(/@timestamp not overwritten \(parse error on (.*?)\)/)
        if timestamp_match
          event.set("[flare][original_timestamp]", timestamp_match[1])
          reasons << "@timestamp is not ISO-8601: #{timestamp_match[1]}"
        end
      end

      required = ["[trace][id]", "[source][ip]", "[http][request][method]", "[http][response][status_code]", "[url][path]"]
      missing = required.select { |field| value = event.get(field); value.nil? || value.to_s.empty? }
      reasons << "required field(s) absent: #{missing.join(", ")}" unless missing.empty?

      begin
        raw = event.get("@timestamp")
        raise ArgumentError, "absent" if raw.nil? || raw.to_s.empty?
        event.set("@timestamp", LogStash::Timestamp.new(Time.iso8601(raw.to_s))) unless raw.is_a?(LogStash::Timestamp)
      rescue StandardError => e
        reasons << "@timestamp is not ISO-8601: #{e.message}"
        event.set("[flare][original_timestamp]", raw.to_s) unless raw.nil?
        event.set("@timestamp", LogStash::Timestamp.now)
      end

      integer_fields = {
        "[http][request][bytes]" => [0, nil],
        "[http][response][status_code]" => [100, 599],
        "[http][response][body][bytes]" => [0, nil]
      }
      integer_fields.each do |field, bounds|
        begin
          value = Integer(event.get(field).to_s, 10)
          raise RangeError, "below #{bounds[0]}" if value < bounds[0]
          raise RangeError, "above #{bounds[1]}" if bounds[1] && value > bounds[1]
          event.set(field, value)
        rescue StandardError => e
          reasons << "#{field} is invalid: #{e.message}"
        end
      end

      begin
        seconds = Float(event.get("[event][duration_seconds]").to_s)
        raise RangeError, "must be finite and non-negative" unless seconds.finite? && seconds >= 0
        event.set("[event][duration]", (seconds * 1_000_000_000).round)
        event.remove("[event][duration_seconds]")
      rescue StandardError => e
        reasons << "event.duration_seconds is invalid: #{e.message}"
      end

      begin
        source_ip = IPAddr.new(event.get("[source][ip]").to_s)
        scope = @scopes.find { |_label, networks| networks.any? { |network| network.include?(source_ip) } }
        event.set("[flare][source_ip_scope]", scope[0]) if scope
      rescue StandardError => e
        reasons << "source.ip is invalid: #{e.message}"
      end

      unless reasons.empty?
        event.tag("nginx_parse_failure")
        event.set("[flare][parse_error_reason]", reasons.uniq.join("; "))
      end
    '
  }

  if "nginx_parse_failure" not in [tags] {
    if [http][response][status_code] < 400 {
      mutate { replace => { "[event][outcome]" => "success" } }
    } else {
      mutate { replace => { "[event][outcome]" => "failure" } }
    }

    if [user_agent][original] {
      useragent {
        source => "[user_agent][original]"
        target => "user_agent"
      }
    }

    # Only globally routable addresses reach the City/ASN databases. Private,
    # loopback, link-local, documentation and reserved CIDRs keep their label.
    if ![flare][source_ip_scope] {
      geoip {
        source => "[source][ip]"
        target => "source"
        default_database_type => "City"
      }
      geoip {
        source => "[source][ip]"
        target => "source"
        default_database_type => "ASN"
      }
    }

    if ![flare][detection][type] and [user_agent][original] =~ /(?i)(sqlmap|nikto|nmap|masscan|zgrab|gobuster|dirbuster|wpscan|acunetix)/ {
      mutate {
        replace => {
          "[flare][detection][type]" => "scanner_user_agent"
          "[flare][detection][severity]" => "medium"
          "[flare][detection][reason]" => "User-Agent matched a scanner heuristic"
        }
      }
    }
  }

  if "nginx_parse_failure" in [tags] {
    mutate {
      replace => {
        "[data_stream][type]" => "logs"
        "[data_stream][dataset]" => "nginx.parse_error"
        "[data_stream][namespace]" => "lab"
      }
    }
    fingerprint {
      source => ["message", "@timestamp", "[flare][parse_error_reason]"]
      target => "[@metadata][document_id]"
      method => "SHA256"
      concatenate_sources => true
    }
  } else {
    mutate {
      replace => {
        "[data_stream][type]" => "logs"
        "[data_stream][dataset]" => "nginx.access"
        "[data_stream][namespace]" => "lab"
      }
    }
  }
}

output {
  if "nginx_parse_failure" in [tags] {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "logstash_internal"
      password => "${LOGSTASH_INTERNAL_PASSWORD}"
      ssl_enabled => true
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca.crt"]
      ssl_verification_mode => "full"
      data_stream => "true"
      data_stream_type => "logs"
      data_stream_dataset => "nginx.parse_error"
      data_stream_namespace => "lab"
      document_id => "%{[@metadata][document_id]}"
    }
  } else {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "logstash_internal"
      password => "${LOGSTASH_INTERNAL_PASSWORD}"
      ssl_enabled => true
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca.crt"]
      ssl_verification_mode => "full"
      data_stream => "true"
      data_stream_type => "logs"
      data_stream_dataset => "nginx.access"
      data_stream_namespace => "lab"
      document_id => "%{[trace][id]}"
    }
  }
}
