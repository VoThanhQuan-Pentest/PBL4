services:
  db:
    image: mysql:8.4@sha256:c831a0f11348d402b43d77453e17d770be2eef356615a2823fe0f5a0d6c8b9af
    environment:
      MYSQL_DATABASE: flare_fitness
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Production starts from an empty MySQL volume.  The application applies
      # the complete schema through Flyway; no Docker entrypoint SQL is mounted.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped
    networks:
      - flare-internal

  app:
    build:
      context: ./backend
    # The runtime image already switches to an unprivileged account. Keep the
    # service immutable and remove Linux capabilities as a second containment
    # layer; Spring/Tomcat only needs a writable temporary directory.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      SERVER_PORT: 8080
      # Leave the private Compose MySQL default for local use. Production RDS or
      # any other external database must provide sslMode=VERIFY_IDENTITY.
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:mysql://db:3306/flare_fitness?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}"
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?Set SPRING_DATASOURCE_USERNAME in .env}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in .env}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?Set APP_JWT_SECRET in .env}
      APP_TRUSTED_PROXY_CIDRS: "${APP_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,${FLARE_INTERNAL_SUBNET:-172.30.0.0/24}}"
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,https://flarefitness.site,https://www.flarefitness.site}"
      APP_MAIL_USERNAME: ${APP_MAIL_USERNAME:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-}
      APP_AUTH_COOKIE_SECURE: ${APP_AUTH_COOKIE_SECURE:-false}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flare-internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    networks:
      - flare-internal
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Direct-Nginx default: do not trust forwarded headers from clients.
      # Configure only the CIDR of the TLS terminator immediately in front of nginx.
      NGINX_TRUSTED_PROXY_CIDR: ${NGINX_TRUSTED_PROXY_CIDR:-192.0.2.1/32}
      # For the AWS lab this is the Web Elastic IP. It is an explicit
      # allowlisted Host in addition to local development and existing public
      # names; unknown Host values still receive the default 444.
      NGINX_PUBLIC_SERVER_NAME: ${NGINX_PUBLIC_SERVER_NAME:-localhost}
    volumes:
      - nginx-logs:/var/log/nginx
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - flare-internal

  filebeat:
    image: docker.elastic.co/beats/filebeat:9.4.2@sha256:f2b3bb6a6a02ebfc5f2f91cf8d560522acc4965bdb941f3f1608964cb8544829
    # Filebeat is opt-in locally because it needs the non-committed mTLS
    # material. Production Web deployment starts this profile explicitly.
    profiles: ["observability"]
    # Elastic's image and bootstrap-created key are both UID 1000. Running as
    # that unprivileged user lets cap_drop=ALL remain effective (container root
    # without DAC_OVERRIDE cannot read a host mode-0600 key).
    user: "1000:1000"
    command: ["filebeat", "-e", "--strict.perms=false", "--path.data=/var/lib/filebeat"]
    environment:
      LOGSTASH_HOSTS: ${FILEBEAT_LOGSTASH_HOST:-10.20.10.20:5044}
    volumes:
      - nginx-logs:/var/log/nginx:ro
      - filebeat-data:/var/lib/filebeat
      - ./observability/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ${FILEBEAT_CERTS_DIR:-./.secrets/observability/web}/ca.crt:/usr/share/filebeat/certs/ca.crt:ro
      - ${FILEBEAT_CERTS_DIR:-./.secrets/observability/web}/filebeat-web.crt:/usr/share/filebeat/certs/filebeat-web.crt:ro
      - ${FILEBEAT_CERTS_DIR:-./.secrets/observability/web}/filebeat-web.key:/usr/share/filebeat/certs/filebeat-web.key:ro
    depends_on:
      filebeat-data-init:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    networks:
      - flare-internal

  filebeat-data-init:
    image: docker.elastic.co/beats/filebeat:9.4.2@sha256:f2b3bb6a6a02ebfc5f2f91cf8d560522acc4965bdb941f3f1608964cb8544829
    profiles: ["observability"]
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command: ["chown 1000:1000 /var/lib/filebeat"]
    volumes:
      - filebeat-data:/var/lib/filebeat
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    network_mode: none
    restart: "no"

volumes:
  mysql-data:
  nginx-logs:
  filebeat-data:

networks:
  flare-internal:
    driver: bridge
    ipam:
      config:
        - subnet: ${FLARE_INTERNAL_SUBNET:-172.30.0.0/24}
